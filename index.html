<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCO - Controle de Serviços</title>
    <!-- Boxicons para ícones modernos -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Injeção de estilos CSS -->
    <?!= include('styles'); ?>
</head>
<body>
    <!-- Seção da Aplicação Interna (Inicialmente Oculta) -->
    <div id="appScreen" style="display: none; width: 100%;">
        <?!= include('navbar'); ?>
        <main class="app-content">
            <div class="welcome-card">
                <h2>Seja bem-vindo ao SCO!</h2>
                <p>Use o menu superior para navegar entre os cadastros e consultas do sistema de gerenciamento.</p>
            </div>
        </main>
    </div>

    <!-- Seção de Login (Inicialmente Visível) -->
    <div id="loginScreen">
        <div class="container">
            <!-- Formulário de Login -->
            <div class="form-box login">
                <form id="loginForm">
                    <h1>Login</h1>
                    <div class="input-box">
                        <input type="email" id="loginEmail" placeholder="E-mail" required>
                        <i class="bx bxs-envelope"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="loginPassword" placeholder="Senha" required>
                        <i class="bx bxs-lock"></i>
                    </div>
                    <div class="forget-password">
                        <input type="checkbox" id="showLoginPassword">
                        <label for="showLoginPassword">Visualizar senha</label>
                    </div>
                    <div class="forgot-link">
                        <a href="#">Esqueceu a senha?</a>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </div>

            <!-- Formulário de Registro -->
            <div class="form-box register">
                <form id="registerForm">
                    <h1>Registrar</h1>
                    <div class="input-box">
                        <input type="text" id="registerUser" placeholder="Nome de Usuário" required>
                        <i class="bx bxs-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="email" id="registerEmail" placeholder="E-mail" required>
                        <i class="bx bxs-envelope"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="registerPassword" placeholder="Senha" required>
                        <i class="bx bxs-lock"></i>
                    </div>
                    <div class="forget-password">
                        <input type="checkbox" id="showRegisterPassword">
                        <label for="showRegisterPassword">Visualizar senha</label>
                    </div>
                    <button type="submit" class="btn">Registrar</button>
                </form>
            </div>

            <!-- Painéis de Alternância -->
            <div class="togle-box">
                <div class="togle-panel togle-left">
                    <h1>Seja bem-vindo!</h1>
                    <p>Não tem uma conta?</p>
                    <button class="btn register-btn">Registrar</button>
                </div>
                <div class="togle-panel togle-right">
                    <h1>Você voltou!</h1>
                    <p>Você já tem uma conta?</p>
                    <button class="btn login-btn">Login</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Injeção de scripts JavaScript -->
    <?!= include('javascript'); ?>
    <?!= include('validacao'); ?>
    <?!= include('loading'); ?>
</body>
</html>
