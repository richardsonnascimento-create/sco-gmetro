<script>
    const Message = {
        show(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            if (!container) return;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const icons = {
                success: '<i class="bx bx-check-circle"></i>',
                error: '<i class="bx bx-x-circle"></i>',
                info: '<i class="bx bx-info-circle"></i>'
            };
            
            const sanitizedText = this.escapeHtml(text);
            
            messageDiv.innerHTML = `
                <span class="message-icon">${icons[type] || icons.info}</span>
                <span class="message-text">${sanitizedText}</span>
            `;
            
            container.innerHTML = '';
            container.appendChild(messageDiv);
            container.classList.add('show');
            
            setTimeout(() => {
                container.classList.remove('show');
            }, 5000);
        },

        hide() {
            const container = document.getElementById('messageContainer');
            if (container) {
                container.classList.remove('show');
            }
        },

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    };

    const App = {
        init() {
            try {
                this.bindUIActions();
                this.initNavbarLogic();
                this.initRealTimeValidation();
            } catch (error) {
                console.error('Erro durante a inicialização do App:', error);
            }
        },

        bindUIActions() {
            const container = document.querySelector('.container');
            const registerBtn = document.querySelector('.register-btn');
            const loginBtn = document.querySelector('.login-btn');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const showLoginPassword = document.getElementById('showLoginPassword');
            const showRegisterPassword = document.getElementById('showRegisterPassword');
            const logoutBtn = document.getElementById('logoutBtn');

            if (registerBtn && container) {
                registerBtn.addEventListener('click', () => {
                    container.classList.add('active');
                });
            }

            if (loginBtn && container) {
                loginBtn.addEventListener('click', () => {
                    container.classList.remove('active');
                });
            }

            if (loginForm) {
                loginForm.addEventListener('submit', this.handleLoginSubmit.bind(this));
            }
            if (registerForm) {
                registerForm.addEventListener('submit', this.handleRegisterSubmit.bind(this));
            }

            if (showLoginPassword) {
                showLoginPassword.addEventListener('change', (event) => {
                    Validation.togglePasswordVisibility('loginPassword', event.target.checked);
                });
            }

            if (showRegisterPassword) {
                showRegisterPassword.addEventListener('change', (event) => {
                    Validation.togglePasswordVisibility('registerPassword', event.target.checked);
                });
            }

            if (logoutBtn) {
                logoutBtn.addEventListener('click', this.handleLogout.bind(this));
            }
        },

        initNavbarLogic() {
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.getElementById('navMenu');
            
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('show');
                    navToggle.classList.toggle('active');
                });
            }

            const dropdowns = document.querySelectorAll('.nav-item.dropdown > a');
            dropdowns.forEach(dropdown => {
                dropdown.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        const parent = dropdown.parentElement;
                        if (parent) {
                            parent.classList.toggle('open');
                        }
                    }
                });
            });
        },

        initRealTimeValidation() {
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const registerUser = document.getElementById('registerUser');
            const registerEmail = document.getElementById('registerEmail');
            const registerPassword = document.getElementById('registerPassword');

            if (loginEmail) {
                loginEmail.addEventListener('input', () => {
                    this.clearFieldError(loginEmail);
                    if (loginEmail.value && !Validation.validateEmail(loginEmail.value)) {
                        this.showFieldError(loginEmail, 'Email inválido');
                    }
                });
                loginEmail.addEventListener('blur', () => {
                    if (loginEmail.value && !Validation.validateEmail(loginEmail.value)) {
                        this.showFieldError(loginEmail, 'Email inválido');
                    }
                });
            }

            if (loginPassword) {
                loginPassword.addEventListener('input', () => {
                    this.clearFieldError(loginPassword);
                });
            }

            if (registerUser) {
                registerUser.addEventListener('input', () => {
                    this.clearFieldError(registerUser);
                    if (registerUser.value && !Validation.validateUsername(registerUser.value)) {
                        this.showFieldError(registerUser, 'Mínimo 3 caracteres');
                    }
                });
            }

            if (registerEmail) {
                registerEmail.addEventListener('input', () => {
                    this.clearFieldError(registerEmail);
                    if (registerEmail.value && !Validation.validateEmail(registerEmail.value)) {
                        this.showFieldError(registerEmail, 'Email inválido');
                    }
                });
                registerEmail.addEventListener('blur', () => {
                    if (registerEmail.value && !Validation.validateEmail(registerEmail.value)) {
                        this.showFieldError(registerEmail, 'Email inválido');
                    }
                });
            }

            if (registerPassword) {
                registerPassword.addEventListener('input', () => {
                    this.clearFieldError(registerPassword);
                    if (registerPassword.value && !Validation.validatePassword(registerPassword.value)) {
                        this.showFieldError(registerPassword, 'Mínimo 6 caracteres');
                    }
                });
            }
        },

        showFieldError(input, message) {
            input.classList.add('input-error');
            let errorSpan = input.parentElement.querySelector('.field-error');
            if (!errorSpan) {
                errorSpan = document.createElement('span');
                errorSpan.className = 'field-error';
                input.parentElement.appendChild(errorSpan);
            }
            errorSpan.textContent = message;
        },

        clearFieldError(input) {
            input.classList.remove('input-error');
            const errorSpan = input.parentElement.querySelector('.field-error');
            if (errorSpan) {
                errorSpan.remove();
            }
        },

        handleLoginSubmit(event) {
            event.preventDefault();
            const submitBtn = event.target.querySelector('button[type="submit"]');
            this.setButtonLoading(submitBtn, true);

            const emailInput = document.getElementById('loginEmail');
            const passwordInput = document.getElementById('loginPassword');

            if (!emailInput || !passwordInput) {
                Message.show('Erro nos campos do formulário.', 'error');
                this.setButtonLoading(submitBtn, false);
                return;
            }

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            this.clearFieldError(emailInput);
            this.clearFieldError(passwordInput);

            let hasError = false;

            if (!email) {
                this.showFieldError(emailInput, 'Email é obrigatório');
                hasError = true;
            } else if (!Validation.validateEmail(email)) {
                this.showFieldError(emailInput, 'Email inválido');
                hasError = true;
            }

            if (!password) {
                this.showFieldError(passwordInput, 'Senha é obrigatória');
                hasError = true;
            }

            if (hasError) {
                Message.show('Por favor, corrija os campos destacados.', 'error');
                this.setButtonLoading(submitBtn, false);
                return;
            }

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((response) => {
                        this.handleLoginResponse(response, email);
                        this.setButtonLoading(submitBtn, false);
                    })
                    .withFailureHandler((error) => {
                        this.handleAuthFailure(error);
                        this.setButtonLoading(submitBtn, false);
                    })
                    .processLogin(email, password);
            } else {
                setTimeout(() => {
                    this.handleLoginResponse({ success: true, message: 'Login Simulado!' }, email);
                    this.setButtonLoading(submitBtn, false);
                }, 1000);
            }
        },

        handleLoginResponse(response, email) {
            Loading.hide();
            if (response.success) {
                const userDisplay = document.getElementById('userDisplayName');
                if (userDisplay) {
                    userDisplay.textContent = email;
                }
                
                const loginScreen = document.getElementById('loginScreen');
                const appScreen = document.getElementById('appScreen');
                
                if (loginScreen && appScreen) {
                    loginScreen.style.display = 'none';
                    appScreen.style.display = 'block';
                    document.body.style.background = '#f4f6fb';
                    document.body.style.alignItems = 'stretch';
                }
            } else {
                Message.show(response.message, 'error');
            }
        },

        handleRegisterSubmit(event) {
            event.preventDefault();
            const submitBtn = event.target.querySelector('button[type="submit"]');
            this.setButtonLoading(submitBtn, true);

            const usernameInput = document.getElementById('registerUser');
            const emailInput = document.getElementById('registerEmail');
            const passwordInput = document.getElementById('registerPassword');

            if (!usernameInput || !emailInput || !passwordInput) {
                Message.show('Erro nos campos de formulário.', 'error');
                this.setButtonLoading(submitBtn, false);
                return;
            }

            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            this.clearFieldError(usernameInput);
            this.clearFieldError(emailInput);
            this.clearFieldError(passwordInput);

            let hasError = false;

            if (!username) {
                this.showFieldError(usernameInput, 'Nome de usuário é obrigatório');
                hasError = true;
            } else if (!Validation.validateUsername(username)) {
                this.showFieldError(usernameInput, 'Mínimo 3 caracteres');
                hasError = true;
            }

            if (!email) {
                this.showFieldError(emailInput, 'Email é obrigatório');
                hasError = true;
            } else if (!Validation.validateEmail(email)) {
                this.showFieldError(emailInput, 'Email inválido');
                hasError = true;
            }

            if (!password) {
                this.showFieldError(passwordInput, 'Senha é obrigatória');
                hasError = true;
            } else if (!Validation.validatePassword(password)) {
                this.showFieldError(passwordInput, 'Mínimo 6 caracteres');
                hasError = true;
            }

            if (hasError) {
                Message.show('Por favor, corrija os campos destacados.', 'error');
                this.setButtonLoading(submitBtn, false);
                return;
            }

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((response) => {
                        this.handleRegisterResponse(response);
                        this.setButtonLoading(submitBtn, false);
                    })
                    .withFailureHandler((error) => {
                        this.handleAuthFailure(error);
                        this.setButtonLoading(submitBtn, false);
                    })
                    .registerUser(username, email, password);
            } else {
                setTimeout(() => {
                    this.handleRegisterResponse({ success: true, message: 'Registro simulado!' });
                    this.setButtonLoading(submitBtn, false);
                }, 1000);
            }
        },

        handleRegisterResponse(response) {
            Loading.hide();
            if (response.success) {
                Message.show(response.message, 'success');
                const registerForm = document.getElementById('registerForm');
                if (registerForm) {
                    registerForm.reset();
                }
                setTimeout(() => {
                    const container = document.querySelector('.container');
                    if (container) {
                        container.classList.remove('active');
                    }
                }, 2000);
            } else {
                Message.show(response.message, 'error');
            }
        },

        handleLogout() {
            Loading.show();
            setTimeout(() => {
                Loading.hide();
                const loginScreen = document.getElementById('loginScreen');
                const appScreen = document.getElementById('appScreen');
                const loginForm = document.getElementById('loginForm');
                
                if (loginScreen && appScreen) {
                    appScreen.style.display = 'none';
                    loginScreen.style.display = 'flex';
                    
                    if (loginForm) {
                        loginForm.reset();
                    }
                    
                    document.body.style.background = 'linear-gradient(90deg, var(--secondary-color), var(--primary-color))';
                    document.body.style.display = 'flex';
                    document.body.style.justifyContent = 'center';
                    document.body.style.alignItems = 'center';
                }
            }, 500);
        },

        handleAuthFailure(error) {
            Loading.hide();
            console.error('Erro na comunicação com o servidor:', error);
            Message.show('Ocorreu um erro. Por favor, tente novamente mais tarde.', 'error');
        },

        setButtonLoading(button, isLoading) {
            if (!button) return;
            
            if (isLoading) {
                button.disabled = true;
                button.dataset.originalText = button.textContent;
                button.textContent = 'Aguarde...';
                button.classList.add('btn-loading');
            } else {
                button.disabled = false;
                button.textContent = button.dataset.originalText || button.textContent;
                button.classList.remove('btn-loading');
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        App.init();
        Loading.hide();
    });
</script>
