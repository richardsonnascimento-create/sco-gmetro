<script>
    const App = {
        init() {
            try {
                console.log('[App.init] iniciando...');
                console.log('[App.init] current URL:', window.location.href);
                const token = this.getToken();
                console.log('[App.init] token:', token ? 'encontrado' : 'ausente');

                if (!token) {
                    if (document.getElementById('loginScreen')) {
                        console.log('[App.init] pagina de login detectada, aguardando autenticacao.');
                        Loading.hide();
                        this.resetLoginScreen();
                        return;
                    }
                    console.log('[App.init] sem token, redirecionando para login');
                    this.redirectToLogin();
                    return;
                }

                if (document.getElementById('loginScreen')) {
                    console.log('[App.init] token encontrado em pagina de login, exibindo app sem mudar URL.');
                    this.showApp(token);
                    return;
                }

                this.validateAndShowApp(token);
                this.initNavbarLogic();
                this.bindNavLinks(token);
                this.bindLogout(token);
            } catch (error) {
                console.error('[App.init] Erro:', error);
            }
        },

        getToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const sessionToken = sessionStorage.getItem('sco_token');
            console.log('[getToken] URL token:', urlToken ? urlToken.substring(0, 8) + '...' : 'null');
            console.log('[getToken] sessionStorage token:', sessionToken ? sessionToken.substring(0, 8) + '...' : 'null');

            if (urlToken && !sessionToken) {
                sessionStorage.setItem('sco_token', urlToken);
                console.log('[App.getToken] armazenou token da URL em sessionStorage');
                return urlToken;
            }

            return sessionToken || urlToken;
        },

        getBaseUrl() {
            return window.location.href.split('?')[0].split('#')[0];
        },

        navigateToUrl(url) {
            try {
                if (window.self !== window.top) {
                    window.top.location.href = url;
                    return;
                }
            } catch (error) {
                console.warn('[App.navigateToUrl] top navigation failed', error);
            }
            window.location.href = url;
        },

        redirectToLogin() {
            this.navigateToUrl(this.getBaseUrl());
        },

        showLogin() {
            const loginScreen = document.getElementById('loginScreen');
            const appScreen = document.getElementById('appScreen');

            if (appScreen) {
                appScreen.style.display = 'none';
            }
            if (loginScreen) {
                loginScreen.style.display = 'flex';
            }

            Loading.hide();
            this.resetLoginScreen();
            sessionStorage.removeItem('sco_token');
        },

        resetLoginScreen() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.reset();
            }
            document.querySelectorAll('.field-error').forEach((errorEl) => {
                errorEl.remove();
            });
        },

        showApp(token) {
            const loginScreen = document.getElementById('loginScreen');
            const appScreen = document.getElementById('appScreen');

            if (loginScreen) {
                loginScreen.style.display = 'none';
            }
            if (appScreen) {
                appScreen.style.display = 'flex';
            }

            Loading.hide();
            sessionStorage.setItem('sco_token', token);
            this.validateAndShowApp(token);
            this.initNavbarLogic();
            this.bindLogout(token);
        },

        validateAndShowApp(token) {
            console.log('[validateAndShowApp] validando token...');
            Loading.show();
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((response) => {
                        console.log('[validateAndShowApp] resposta:', JSON.stringify(response));
                        if (response.valid) {
                            const userDisplay = document.getElementById('userDisplayName');
                            if (userDisplay) {
                                userDisplay.textContent = response.email;
                            }
                            this.checkAdminStatus(token);
                        } else {
                            sessionStorage.removeItem('sco_token');
                            this.showLogin();
                        }
                        Loading.hide();
                    })
                    .withFailureHandler((error) => {
                        console.error("[validateAndShowApp] erro:", error);
                        Message.show("Erro ao validar a sessao. Por favor, tente novamente.", "error");
                        this.showLogin();
                        Loading.hide();
                    })
                    .checkSession(token);
            } else {
                Loading.hide();
            }
        },

        checkAdminStatus(token) {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((response) => {
                        if (response.isAdmin) {
                            const adminItem = document.getElementById('navAdminItem');
                            if (adminItem) {
                                adminItem.style.display = 'block';
                            }
                            const adminLink = document.getElementById('adminLink');
                            if (adminLink) {
                                adminLink.addEventListener('click', (e) => {
                                    e.preventDefault();
                                    this.toggleAdmin(token);
                                });
                            }
                        }
                    })
                    .withFailureHandler(() => {})
                    .isAdmin(token);
            }
        },

        toggleAdmin(token) {
            const adminScreen = document.getElementById('adminScreen');
            const appContent = document.querySelector('.app-content');
            if (!adminScreen) return;

            if (adminScreen.style.display === 'none') {
                Admin.init(token);
            } else {
                adminScreen.style.display = 'none';
                if (appContent) appContent.style.display = 'block';
            }
        },

        initNavbarLogic() {
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.getElementById('navMenu');
            
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navMenu.classList.toggle('show');
                    navToggle.classList.toggle('active');
                });
            }

            // Fecha menu ao clicar fora
            document.addEventListener('click', (e) => {
                if (!navMenu || !navToggle) return;
                const isClickInside = navMenu.contains(e.target) || navToggle.contains(e.target);
                if (!isClickInside && navMenu.classList.contains('show')) {
                    navMenu.classList.remove('show');
                    navToggle.classList.remove('active');
                }
            });

            // Dropdowns: toggle via clique em qualquer tamanho de tela
            const dropdowns = document.querySelectorAll('.nav-item.dropdown > a');
            dropdowns.forEach(dropdown => {
                dropdown.addEventListener('click', (e) => {
                    const parent = dropdown.parentElement;
                    if (!parent) return;

                    // Em telas > 1024px, dropdown abre via hover — não interfere
                    // Em telas <= 1024px, toggle manual
                    if (window.innerWidth <= 1024) {
                        e.preventDefault();
                        // Fecha outros dropdowns abertos
                        document.querySelectorAll('.nav-item.dropdown.open').forEach((openItem) => {
                            if (openItem !== parent) {
                                openItem.classList.remove('open');
                            }
                        });
                        parent.classList.toggle('open');
                    }
                });
            });
        },

        bindNavLinks(token) {
            const navProprietario = document.getElementById('navProprietario');
            if (navProprietario) {
                navProprietario.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.toggleProprietario(token);
                });
            }

            const navHome = document.getElementById('navHome');
            if (navHome) {
                navHome.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showHome();
                });
            }
        },

        bindLogout(token) {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    Loading.show();
                    if (typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run
                            .withSuccessHandler(() => {
                                this.showLogin();
                            })
                            .withFailureHandler((error) => {
                                console.error("Erro durante o logout:", error);
                                Message.show("Erro ao fazer logout. Por favor, tente novamente.", "error");
                                this.showLogin();
                            })
                            .logoutUser(token);
                    } else {
                        this.showLogin();
                    }
                });
            }
        },

        toggleProprietario(token) {
            document.getElementById('pageHome').style.display = 'none';
            document.getElementById('pageProprietario').style.display = 'block';
            Proprietario.init(token);
        },

        showHome() {
            document.getElementById('pageHome').style.display = 'block';
            document.getElementById('pageProprietario').style.display = 'none';
            const adminScreen = document.getElementById('adminScreen');
            if (adminScreen) adminScreen.style.display = 'none';
        }
    };

    window.addEventListener('error', (event) => {
        console.error('[App.window.error]', event.message, event.filename, event.lineno, event.colno, event.error);
    });

    window.addEventListener('unhandledrejection', (event) => {
        console.error('[App.unhandledrejection]', event.reason);
    });

    document.addEventListener('DOMContentLoaded', () => {
        App.init();
        Loading.hide();
    });
</script>
