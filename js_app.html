<script>
    const App = {
        init() {
            try {
                console.log('[App.init] iniciando...');
                console.log('[App.init] current URL:', window.location.href);
                const token = this.getToken();
                console.log('[App.init] token:', token ? 'encontrado' : 'ausente');

                if (!token) {
                    if (document.getElementById('loginScreen')) {
                        console.log('[App.init] pagina de login detectada, aguardando autenticacao.');
                        Loading.hide();
                        this.resetLoginScreen();
                        return;
                    }
                    console.log('[App.init] sem token, redirecionando para login');
                    this.redirectToLogin();
                    return;
                }

                if (document.getElementById('loginScreen')) {
                    console.log('[App.init] token encontrado em pagina de login, exibindo app sem mudar URL.');
                    this.showApp(token);
                    return;
                }

                this.validateAndShowApp(token);
                this.initNavbarLogic();
                this.bindLogout(token);
            } catch (error) {
                console.error('[App.init] Erro:', error);
            }
        },

        getToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const sessionToken = sessionStorage.getItem('sco_token');
            console.log('[getToken] URL token:', urlToken ? urlToken.substring(0, 8) + '...' : 'null');
            console.log('[getToken] sessionStorage token:', sessionToken ? sessionToken.substring(0, 8) + '...' : 'null');

            if (urlToken && !sessionToken) {
                sessionStorage.setItem('sco_token', urlToken);
                console.log('[App.getToken] armazenou token da URL em sessionStorage');
                return urlToken;
            }

            return sessionToken || urlToken;
        },

        getBaseUrl() {
            return window.location.href.split('?')[0].split('#')[0];
        },

        navigateToUrl(url) {
            try {
                if (window.self !== window.top) {
                    window.top.location.href = url;
                    return;
                }
            } catch (error) {
                console.warn('[App.navigateToUrl] top navigation failed', error);
            }
            window.location.href = url;
        },

        redirectToLogin() {
            this.navigateToUrl(this.getBaseUrl());
        },

        showLogin() {
            const loginScreen = document.getElementById('loginScreen');
            const appScreen = document.getElementById('appScreen');

            if (appScreen) {
                appScreen.style.display = 'none';
            }
            if (loginScreen) {
                loginScreen.style.display = 'flex';
            }

            Loading.hide();
            this.resetLoginScreen();
            sessionStorage.removeItem('sco_token');
        },

        resetLoginScreen() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.reset();
            }
            document.querySelectorAll('.field-error').forEach((errorEl) => {
                errorEl.remove();
            });
        },

        showApp(token) {
            const loginScreen = document.getElementById('loginScreen');
            const appScreen = document.getElementById('appScreen');

            if (loginScreen) {
                loginScreen.style.display = 'none';
            }
            if (appScreen) {
                appScreen.style.display = 'flex';
            }

            Loading.hide();
            sessionStorage.setItem('sco_token', token);
            this.validateAndShowApp(token);
            this.initNavbarLogic();
            this.bindLogout(token);
        },

        validateAndShowApp(token) {
            console.log('[validateAndShowApp] validando token...');
            Loading.show();
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((response) => {
                        console.log('[validateAndShowApp] resposta:', JSON.stringify(response));
                        if (response.valid) {
                            const userDisplay = document.getElementById('userDisplayName');
                            if (userDisplay) {
                                userDisplay.textContent = response.email;
                            }
                        } else {
                            sessionStorage.removeItem('sco_token');
                            this.showLogin();
                        }
                        Loading.hide();
                    })
                    .withFailureHandler((error) => {
                        console.error("[validateAndShowApp] erro:", error);
                        Message.show("Erro ao validar a sessao. Por favor, tente novamente.", "error");
                        this.showLogin();
                        Loading.hide();
                    })
                    .checkSession(token);
            } else {
                Loading.hide();
            }
        },

        initNavbarLogic() {
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.getElementById('navMenu');
            
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('show');
                    navToggle.classList.toggle('active');
                });
            }

            const dropdowns = document.querySelectorAll('.nav-item.dropdown > a');
            dropdowns.forEach(dropdown => {
                dropdown.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        const parent = dropdown.parentElement;
                        if (parent) {
                            parent.classList.toggle('open');
                        }
                    }
                });
            });
        },

        bindLogout(token) {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    Loading.show();
                    if (typeof google !== 'undefined' && google.script && google.script.run) {
                        google.script.run
                            .withSuccessHandler(() => {
                                this.showLogin();
                            })
                            .withFailureHandler((error) => {
                                console.error("Erro durante o logout:", error);
                                Message.show("Erro ao fazer logout. Por favor, tente novamente.", "error");
                                this.showLogin();
                            })
                            .logoutUser(token);
                    } else {
                        this.showLogin();
                    }
                });
            }
        }
    };

    window.addEventListener('error', (event) => {
        console.error('[App.window.error]', event.message, event.filename, event.lineno, event.colno, event.error);
    });

    window.addEventListener('unhandledrejection', (event) => {
        console.error('[App.unhandledrejection]', event.reason);
    });

    document.addEventListener('DOMContentLoaded', () => {
        App.init();
        Loading.hide();
    });
</script>
