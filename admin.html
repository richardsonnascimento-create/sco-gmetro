<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCO - Administração</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <?!= include('styles'); ?>
</head>
<body style="background: #f4f6fb; display: block; padding: 0; align-items: stretch;">
    <div id="appScreen" style="width: 100%;">
        <?!= include('navbar'); ?>
        <main class="app-content">
            <div class="admin-container">
                <h2>Administração de Usuários</h2>
                <p class="admin-subtitle">Aprove, rejeite ou modifique os módulos de acesso de cada usuário.</p>
                <div id="adminContent">
                    <div class="admin-empty">Carregando usuários...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="messageContainer" class="message-container" role="alert" aria-live="polite"></div>

    <?!= include('loading'); ?>
    <?!= include('js_utils'); ?>

    <script>
        (function () {
            const MODULOS_DISPONIVEIS = [
                'Cadastro de Proprietário',
                'Login',
                'Serviços',
            ];

            var token = null;

            function getToken() {
                var urlParams = new URLSearchParams(window.location.search);
                var urlToken = urlParams.get('token');
                var sessionToken = sessionStorage.getItem('sco_token');
                return sessionToken || urlToken;
            }

            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderTable(users) {
                var container = document.getElementById('adminContent');
                var html = '';

                if (!users || users.length === 0) {
                    container.innerHTML = '<div class="admin-empty">Nenhum usuário encontrado.</div>';
                    return;
                }

                html += '<table class="admin-table" role="table">';
                html += '<thead><tr>';
                html += '<th>Usuário</th>';
                html += '<th>Email</th>';
                html += '<th>Status</th>';
                html += '<th>Módulos</th>';
                html += '<th>Ação</th>';
                html += '</tr></thead>';
                html += '<tbody>';

                for (var i = 0; i < users.length; i++) {
                    var u = users[i];
                    var modulosArray = u.modulos ? u.modulos.split(',').filter(function (m) { return m.trim(); }) : [];
                    var rowId = 'row-' + i;

                    html += '<tr id="' + rowId + '">';

                    // Username
                    html += '<td data-label="Usuário" class="username-cell">' + escapeHtml(u.username || '-') + '</td>';

                    // Email (read-only)
                    html += '<td data-label="Email" class="email-cell">';
                    html += escapeHtml(u.email);
                    html += '<input type="hidden" class="user-email" value="' + escapeHtml(u.email) + '">';
                    html += '</td>';

                    // Status select
                    html += '<td data-label="Status">';
                    html += '<select class="status-select" aria-label="Status de ' + escapeHtml(u.email) + '">';
                    var statuses = ['pendente', 'aprovado', 'rejeitado'];
                    for (var s = 0; s < statuses.length; s++) {
                        var sel = statuses[s] === u.status ? ' selected' : '';
                        html += '<option value="' + statuses[s] + '"' + sel + '>' + statuses[s].charAt(0).toUpperCase() + statuses[s].slice(1) + '</option>';
                    }
                    html += '</select>';
                    html += '</td>';

                    // Modulos checkboxes
                    html += '<td data-label="Módulos">';
                    html += '<div class="modulos-grid">';
                    for (var m = 0; m < MODULOS_DISPONIVEIS.length; m++) {
                        var modName = MODULOS_DISPONIVEIS[m];
                        var checked = modulosArray.indexOf(modName) !== -1 ? ' checked' : '';
                        var checkboxId = 'mod-' + i + '-' + m;
                        html += '<label for="' + checkboxId + '">';
                        html += '<input type="checkbox" id="' + checkboxId + '" class="mod-checkbox" value="' + escapeHtml(modName) + '"' + checked + '>';
                        html += escapeHtml(modName);
                        html += '</label>';
                    }
                    html += '</div>';
                    html += '</td>';

                    // Save button
                    html += '<td data-label="Ação">';
                    html += '<button class="btn-save-row" data-email="' + escapeHtml(u.email) + '" data-row="' + i + '">Salvar</button>';
                    html += '</td>';

                    html += '</tr>';
                }

                html += '</tbody></table>';
                container.innerHTML = html;

                // Bind save buttons
                var buttons = container.querySelectorAll('.btn-save-row');
                for (var b = 0; b < buttons.length; b++) {
                    buttons[b].addEventListener('click', onSaveRow);
                }
            }

            function onSaveRow(event) {
                var btn = event.currentTarget;
                btn.disabled = true;
                btn.textContent = 'Salvando...';

                var row = btn.closest('tr');
                var email = row.querySelector('.user-email').value;
                var status = row.querySelector('.status-select').value;
                var checkboxes = row.querySelectorAll('.mod-checkbox:checked');
                var modulos = [];
                for (var i = 0; i < checkboxes.length; i++) {
                    modulos.push(checkboxes[i].value);
                }
                var modulosStr = modulos.join(',');

                console.log('[Admin] Salvando:', email, status, modulosStr);

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(function (response) {
                            btn.disabled = false;
                            btn.textContent = 'Salvar';
                            if (response.success) {
                                Message.show(response.message, 'success');
                            } else {
                                Message.show(response.message, 'error');
                            }
                        })
                        .withFailureHandler(function (error) {
                            btn.disabled = false;
                            btn.textContent = 'Salvar';
                            console.error('[Admin] Erro ao salvar:', error);
                            Message.show('Erro ao salvar. Tente novamente.', 'error');
                        })
                        .updateUser(token, email, status, modulosStr);
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Salvar';
                    Message.show('Modo simulação: alterações não salvas.', 'info');
                }
            }

            function showAccessDenied() {
                var container = document.getElementById('adminContent');
                container.innerHTML = [
                    '<div class="admin-error">',
                    '<h3><i class="bx bx-shield-x" style="font-size:48px;color:#dc3545;"></i></h3>',
                    '<h3>Acesso Negado</h3>',
                    '<p>Você não tem permissão para acessar esta página.</p>',
                    '<p style="margin-top:15px;"><a href="' + window.location.href.split('?')[0] + '" class="btn" style="display:inline-block;width:auto;padding:10px 30px;text-decoration:none;">Voltar ao Login</a></p>',
                    '</div>',
                ].join('');
            }

            function init() {
                token = getToken();
                console.log('[Admin] init, token:', token ? token.substring(0, 8) + '...' : 'null');

                if (!token) {
                    showAccessDenied();
                    return;
                }

                Loading.show();

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(function (response) {
                            Loading.hide();
                            if (response.isAdmin) {
                                showAdminNav();
                                loadUsers();
                            } else {
                                showAccessDenied();
                            }
                        })
                        .withFailureHandler(function () {
                            Loading.hide();
                            showAccessDenied();
                        })
                        .isAdmin(token);
                } else {
                    Loading.hide();
                    Message.show('Modo simulação: sem backend.', 'info');
                }
            }

            function showAdminNav() {
                var adminItem = document.getElementById('navAdminItem');
                if (adminItem) {
                    adminItem.style.display = 'block';
                }
                var adminLink = document.getElementById('adminLink');
                if (adminLink) {
                    var baseUrl = window.location.href.split('?')[0].split('#')[0];
                    adminLink.href = baseUrl + '?token=' + encodeURIComponent(token);
                }
            }

            function loadUsers() {
                Loading.show();

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(function (users) {
                            Loading.hide();
                            if (users.error) {
                                Message.show(users.error, 'error');
                                return;
                            }
                            renderTable(users);
                        })
                        .withFailureHandler(function (error) {
                            Loading.hide();
                            console.error('[Admin] Erro ao carregar usuarios:', error);
                            Message.show('Erro ao carregar usuarios.', 'error');
                        })
                        .getUsers(token);
                } else {
                    Loading.hide();
                    var mockUsers = [
                        { email: 'teste@teste.com', username: 'Teste', status: 'aprovado', modulos: 'Login' },
                        { email: 'user2@teste.com', username: 'Usuario 2', status: 'pendente', modulos: '' },
                    ];
                    renderTable(mockUsers);
                }
            }

            document.addEventListener('DOMContentLoaded', function () {
                Loading.hide();
                init();
            });
        })();
    </script>
</body>
</html>
