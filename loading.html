<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<script>
    const Loading = {
        show() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.display = 'flex';
            }
        },

        hide() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.display = 'none';
            }
        }
    };
</script>
