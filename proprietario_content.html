<div class="admin-container">
    <div class="proprietario-header">
            <h2>Cadastro de Proprietários</h2>
            <button class="btn-primary" id="btnNovoProprietario">+ Novo Proprietário</button>
        </div>

        <div id="proprietarioListView">
            <div class="proprietario-toolbar">
                <input type="text" id="proprietarioSearch" placeholder="Buscar por razão social ou CNPJ..." class="search-input">
            </div>
            <div id="proprietarioTableContainer">
                <div class="admin-empty">Carregando proprietários...</div>
            </div>
        </div>

        <div id="proprietarioFormView" style="display: none;">
            <h3 id="proprietarioFormTitle">Novo Proprietário</h3>
            <form id="proprietarioForm" class="form-grid" autocomplete="off">
                <input type="hidden" id="editId" value="">

                <div class="form-group full-width">
                    <label for="razaoSocial">Razão Social *</label>
                    <input type="text" id="razaoSocial" required>
                </div>

                <div class="form-group">
                    <label for="cnpjProprietario">CNPJ *</label>
                    <input type="text" id="cnpjProprietario" required placeholder="00.000.000/0000-00">
                </div>

                <div class="form-group">
                    <label for="situacaoCadastral">Situação Cadastral</label>
                    <select id="situacaoCadastral">
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                        <option value="Suspenso">Suspenso</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" id="logradouro" placeholder="Rua, Av, Travessa...">
                </div>

                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" id="numero">
                </div>

                <div class="form-group">
                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" placeholder="Sala, Bloco, Andar...">
                </div>

                <div class="form-group">
                    <label for="CEP">CEP</label>
                    <input type="text" id="CEP" placeholder="00000-000">
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro">
                </div>

                <div class="form-group">
                    <label for="municipio">Município</label>
                    <input type="text" id="municipio">
                </div>

                <div class="form-group">
                    <label for="UF">UF</label>
                    <select id="UF">
                        <option value="">--</option>
                        <option value="AC">AC</option><option value="AL">AL</option>
                        <option value="AP">AP</option><option value="AM">AM</option>
                        <option value="BA">BA</option><option value="CE">CE</option>
                        <option value="DF">DF</option><option value="ES">ES</option>
                        <option value="GO">GO</option><option value="MA">MA</option>
                        <option value="MT">MT</option><option value="MS">MS</option>
                        <option value="MG">MG</option><option value="PA">PA</option>
                        <option value="PB">PB</option><option value="PR">PR</option>
                        <option value="PE">PE</option><option value="PI">PI</option>
                        <option value="RJ">RJ</option><option value="RN">RN</option>
                        <option value="RS">RS</option><option value="RO">RO</option>
                        <option value="RR">RR</option><option value="SC">SC</option>
                        <option value="SP">SP</option><option value="SE">SE</option>
                        <option value="TO">TO</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="codigoMunicipio">Cód. Município</label>
                    <input type="text" id="codigoMunicipio" placeholder="Código IBGE">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="contato@exemplo.com">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="form-group">
                    <label for="CNAE">CNAE</label>
                    <input type="text" id="CNAE" placeholder="0000-0/00">
                </div>

                <div class="form-group">
                    <label for="proprietario">Proprietário</label>
                    <input type="text" id="proprietario" placeholder="Nome da pessoa física">
                </div>

                <div class="form-group">
                    <label for="autorizacao">Autorização</label>
                    <input type="text" id="autorizacao">
                </div>

                <div class="form-group">
                    <label for="regional">Regional</label>
                    <input type="text" id="regional">
                </div>

                <div class="form-group">
                    <label for="sigla">Sigla</label>
                    <input type="text" id="sigla" maxlength="10">
                </div>

                <div class="form-group full-width">
                    <label for="observacaoProprietario">Observações</label>
                    <textarea id="observacaoProprietario" rows="3"></textarea>
                </div>

                <div class="form-actions full-width">
                    <button type="submit" class="btn-primary" id="btnSalvarProprietario">Salvar</button>
                    <button type="button" class="btn-secondary" id="btnCancelarProprietario">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

<script>
    const Proprietario = {
        token: null,
        editId: null,

        init(token) {
            this.token = token;
            this.loadList();
        },

        showList() {
            const listView = document.getElementById('proprietarioListView');
            const formView = document.getElementById('proprietarioFormView');
            if (listView) listView.style.display = 'block';
            if (formView) formView.style.display = 'none';
        },

        showForm(data, editId) {
            const listView = document.getElementById('proprietarioListView');
            const formView = document.getElementById('proprietarioFormView');
            const title = document.getElementById('proprietarioFormTitle');

            if (listView) listView.style.display = 'none';
            if (formView) formView.style.display = 'block';

            this.editId = editId || null;
            if (title) title.textContent = editId ? 'Editar Proprietário' : 'Novo Proprietário';

            if (data) {
                this._setFormData(data);
            } else {
                document.getElementById('proprietarioForm').reset();
                document.getElementById('editId').value = '';
            }
        },

        _setFormData(data) {
            document.getElementById('editId').value = data.idProprietario || '';
            document.getElementById('razaoSocial').value = data.razaoSocial || '';
            document.getElementById('cnpjProprietario').value = data.cnpjProprietario || '';
            document.getElementById('logradouro').value = data.logradouro || '';
            document.getElementById('numero').value = data.numero || '';
            document.getElementById('complemento').value = data.complemento || '';
            document.getElementById('CEP').value = data.CEP || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('municipio').value = data.municipio || '';
            document.getElementById('UF').value = data.UF || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('telefone').value = data.telefone || '';
            document.getElementById('situacaoCadastral').value = data.situacaoCadastral || 'Ativo';
            document.getElementById('CNAE').value = data.CNAE || '';
            document.getElementById('proprietario').value = data.proprietario || '';
            document.getElementById('autorizacao').value = data.autorizacao || '';
            document.getElementById('regional').value = data.regional || '';
            document.getElementById('sigla').value = data.sigla || '';
            document.getElementById('codigoMunicipio').value = data.codigoMunicipio || '';
            document.getElementById('observacaoProprietario').value = data.observacaoProprietario || '';
        },

        _getFormData() {
            return {
                razaoSocial: document.getElementById('razaoSocial').value.trim(),
                cnpjProprietario: document.getElementById('cnpjProprietario').value.trim(),
                logradouro: document.getElementById('logradouro').value.trim(),
                numero: document.getElementById('numero').value.trim(),
                complemento: document.getElementById('complemento').value.trim(),
                CEP: document.getElementById('CEP').value.trim(),
                bairro: document.getElementById('bairro').value.trim(),
                municipio: document.getElementById('municipio').value.trim(),
                UF: document.getElementById('UF').value,
                email: document.getElementById('email').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                situacaoCadastral: document.getElementById('situacaoCadastral').value,
                CNAE: document.getElementById('CNAE').value.trim(),
                proprietario: document.getElementById('proprietario').value.trim(),
                autorizacao: document.getElementById('autorizacao').value.trim(),
                regional: document.getElementById('regional').value.trim(),
                sigla: document.getElementById('sigla').value.trim(),
                codigoMunicipio: document.getElementById('codigoMunicipio').value.trim(),
                observacaoProprietario: document.getElementById('observacaoProprietario').value.trim(),
            };
        },

        loadList() {
            const container = document.getElementById('proprietarioTableContainer');
            if (!container) return;
            container.innerHTML = '<div class="admin-empty">Carregando proprietários...</div>';
            Loading.show();

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((data) => {
                        Loading.hide();
                        if (data && data.error) {
                            container.innerHTML = '<div class="admin-empty">' + this._esc(data.error) + '</div>';
                            return;
                        }
                        this.renderTable(data || []);
                    })
                    .withFailureHandler((error) => {
                        Loading.hide();
                        container.innerHTML = '<div class="admin-empty">Erro ao carregar dados.</div>';
                        Message.show('Erro ao carregar proprietários.', 'error');
                    })
                    .listarProprietariosEndpoint(this.token);
            }
        },

        renderTable(proprietarios) {
            const container = document.getElementById('proprietarioTableContainer');
            if (!container) return;

            if (!proprietarios || proprietarios.length === 0) {
                container.innerHTML = '<div class="admin-empty">Nenhum proprietário cadastrado.</div>';
                return;
            }

            var html = '<div class="table-responsive">';
            html += '<table class="admin-table proprietario-table" role="table">';
            html += '<thead><tr>';
            html += '<th>ID</th><th>Razão Social</th><th>CNPJ</th><th>Município/UF</th><th>Situação</th><th>Ações</th>';
            html += '</tr></thead><tbody>';

            for (var i = 0; i < proprietarios.length; i++) {
                var p = proprietarios[i];
                var cidadeUf = (p.municipio || '') + (p.UF ? '/' + p.UF : '');
                var situacaoClass = (p.situacaoCadastral || '').toLowerCase();

                html += '<tr>';
                html += '<td data-label="ID">' + (p.idProprietario || '-') + '</td>';
                html += '<td data-label="Razão Social" class="razao-cell">' + this._esc(p.razaoSocial || '-') + '</td>';
                html += '<td data-label="CNPJ">' + this._esc(p.cnpjProprietario || '-') + '</td>';
                html += '<td data-label="Município/UF">' + this._esc(cidadeUf) + '</td>';
                html += '<td data-label="Situação"><span class="status-badge ' + situacaoClass + '">' + this._esc(p.situacaoCadastral || '-') + '</span></td>';
                html += '<td data-label="Ações">';
                html += '<button class="btn-icon btn-edit" data-id="' + p.idProprietario + '" title="Editar"><i class="bx bx-edit"></i></button> ';
                html += '<button class="btn-icon btn-delete" data-id="' + p.idProprietario + '" data-nome="' + this._esc(p.razaoSocial || '') + '" title="Excluir"><i class="bx bx-trash"></i></button>';
                html += '</td>';
                html += '</tr>';
            }

            html += '</tbody></table></div>';
            container.innerHTML = html;

            // Bind events
            container.querySelectorAll('.btn-edit').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    Proprietario.edit(parseInt(btn.dataset.id));
                });
            });

            container.querySelectorAll('.btn-delete').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    Proprietario.confirmDelete(parseInt(btn.dataset.id), btn.dataset.nome);
                });
            });

            this._bindSearch();
        },

        _bindSearch() {
            const searchInput = document.getElementById('proprietarioSearch');
            if (!searchInput) return;

            searchInput.addEventListener('input', function () {
                var filter = this.value.toLowerCase().trim();
                var rows = document.querySelectorAll('.proprietario-table tbody tr');

                for (var i = 0; i < rows.length; i++) {
                    var text = rows[i].textContent.toLowerCase();
                    rows[i].style.display = text.indexOf(filter) !== -1 ? '' : 'none';
                }
            });
        },

        edit(id) {
            Loading.show();
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((data) => {
                        Loading.hide();
                        if (data && data.error) {
                            Message.show(data.error, 'error');
                            return;
                        }
                        this.showForm(data, id);
                    })
                    .withFailureHandler((error) => {
                        Loading.hide();
                        Message.show('Erro ao buscar proprietário.', 'error');
                    })
                    .buscarProprietarioEndpoint(this.token, id);
            }
        },

        confirmDelete(id, nome) {
            var msg = nome
                ? 'Excluir "' + nome + '" (ID ' + id + ')?'
                : 'Excluir proprietário ID ' + id + '?';

            if (!confirm(msg)) return;

            Loading.show();
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                google.script.run
                    .withSuccessHandler((response) => {
                        Loading.hide();
                        if (response.success) {
                            Message.show(response.message, 'success');
                            this.loadList();
                        } else {
                            Message.show(response.message, 'error');
                        }
                    })
                    .withFailureHandler((error) => {
                        Loading.hide();
                        Message.show('Erro ao excluir proprietário.', 'error');
                    })
                    .excluirProprietarioEndpoint(this.token, id);
            }
        },

        save(event) {
            event.preventDefault();

            var dados = this._getFormData();
            if (!dados.razaoSocial || !dados.cnpjProprietario) {
                Message.show('Razão Social e CNPJ são obrigatórios.', 'error');
                return;
            }

            var btn = document.getElementById('btnSalvarProprietario');
            btn.disabled = true;
            btn.textContent = 'Salvando...';
            Loading.show();

            var editId = parseInt(document.getElementById('editId').value) || null;
            var self = this;

            if (typeof google !== 'undefined' && google.script && google.script.run) {
                var run = editId
                    ? google.script.run.withSuccessHandler(function (response) {
                          btn.disabled = false;
                          btn.textContent = 'Salvar';
                          Loading.hide();
                          if (response.success) {
                              Message.show(response.message, 'success');
                              self.showList();
                              self.loadList();
                          } else {
                              Message.show(response.message, 'error');
                          }
                      }).atualizarProprietarioEndpoint(self.token, editId, dados)
                    : google.script.run.withSuccessHandler(function (response) {
                          btn.disabled = false;
                          btn.textContent = 'Salvar';
                          Loading.hide();
                          if (response.success) {
                              Message.show(response.message, 'success');
                              self.showList();
                              self.loadList();
                          } else {
                              Message.show(response.message, 'error');
                          }
                      }).inserirProprietarioEndpoint(self.token, dados);
            }
        },

        _esc(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },
    };

    // Bind form and buttons after DOM ready
    document.addEventListener('DOMContentLoaded', function () {
        var form = document.getElementById('proprietarioForm');
        if (form) {
            form.addEventListener('submit', function (e) { Proprietario.save(e); });
        }

        var btnNovo = document.getElementById('btnNovoProprietario');
        if (btnNovo) {
            btnNovo.addEventListener('click', function () { Proprietario.showForm(null, null); });
        }

        var btnCancelar = document.getElementById('btnCancelarProprietario');
        if (btnCancelar) {
            btnCancelar.addEventListener('click', function () {
                Proprietario.showList();
                Proprietario.loadList();
            });
        }
    });
</script>
