<script>
    /**
     * Utilitário para exibir mensagens toast na tela (sucesso, erro, info).
     * Sanitiza entrada via textContent (prevenção XSS) antes de injetar no DOM.
     * Auto-esconde após 5s para não poluir a UI.
     * @namespace Message
     */
    const Message = {
        /**
         * Exibe mensagem temporária.
         * @param {string} text Texto da mensagem
         * @param {'success'|'error'|'info'} type Tipo visual (define ícone e cor)
         */
        show(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            if (!container) return;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const icons = {
                success: '<i class="bx bx-check-circle"></i>',
                error: '<i class="bx bx-x-circle"></i>',
                info: '<i class="bx bx-info-circle"></i>'
            };
            
            const sanitizedText = this.escapeHtml(text);
            
            messageDiv.innerHTML = `
                <span class="message-icon">${icons[type] || icons.info}</span>
                <span class="message-text">${sanitizedText}</span>
            `;
            
            container.innerHTML = '';
            container.appendChild(messageDiv);
            container.classList.add('show');
            
            setTimeout(() => {
                container.classList.remove('show');
            }, 5000);
        },

        /**
         * Esconde mensagem atual.
         */
        hide() {
            const container = document.getElementById('messageContainer');
            if (container) {
                container.classList.remove('show');
            }
        },

        /**
         * Escapa HTML para prevenir XSS — usa textContent do navegador.
         * @param {string} text Texto a sanitizar
         * @returns {string} HTML seguro
         */
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    };
</script>
